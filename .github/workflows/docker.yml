name: ci

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
  pull_request:
    paths:
      - 'docker/**'

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - run: |
          cd docker
          bash build.sh