name: ci

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker.yml'
      - 'docker/**'
  pull_request:
    paths:
      - '.github/workflows/docker.yml'
      - 'docker/**'

env:
  registry: gitlab-registry.in2p3.fr

jobs:
  qemu:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - 'cpu'
          - 'gpu'
        image:
          - 'interactive'
          - 'interactive_jupyter'
          - 'interactive_vscode'
          - 'learning_platform_code_server'
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to IN2P3 Gitlab Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{env.registry}}
          username: ${{secrets.IN2P3_GITLAB_USERNAME}}
          password: ${{secrets.IN2P3_GITLAB_PASSWORD}}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{env.registry}}/thomas.padioleau/gray-scott-kokkos/kokkos_${{matrix.architecture}}_${{matrix.image}}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{github.workspace}}/docker/${{matrix.architecture}}/${{matrix.image}}
          platforms: linux/amd64,linux/arm64
          push: ${{github.event_name != 'pull_request'}}
          tags: ${{steps.meta.outputs.tags}}
          labels: ${{steps.meta.outputs.labels}}
