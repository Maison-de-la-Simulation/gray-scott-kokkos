name: ci

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
  pull_request:
    paths:
      - 'docker/**'

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to IN2P3 Gitlab Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitlab-registry.in2p3.fr
          username: ${{secrets.IN2P3_GITLAB_USERNAME}}
          password: ${{secrets.IN2P3_GITLAB_PASSWORD}}
      - run: |
          cd docker
          bash build.sh