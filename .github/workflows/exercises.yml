name: Test exercises

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_test_exercises:
    strategy:
      matrix:
        arch:
          - name: x86_64
            os: ubuntu-24.04
          - name: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.os }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - run: |
          docker pull gitlab-registry.in2p3.fr/cta-lapp/phoenix_libs2/citoolkit/phoenixcontainer/pixi_git:9.1.0@sha256:e3f1436e2bcfeaa457e61280e0dd1016d73801faa28d912eee101ade985dc4fc
          docker buildx imagetools inspect gitlab-registry.in2p3.fr/cta-lapp/phoenix_libs2/citoolkit/phoenixcontainer/pixi_git:9.1.0@sha256:e3f1436e2bcfeaa457e61280e0dd1016d73801faa28d912eee101ade985dc4fc
          docker create --name inspectme gitlab-registry.in2p3.fr/cta-lapp/phoenix_libs2/citoolkit/phoenixcontainer/pixi_git:9.1.0@sha256:e3f1436e2bcfeaa457e61280e0dd1016d73801faa28d912eee101ade985dc4fc
          docker export inspectme -o rootfs.tar
          mkdir rootfs
          tar -xf rootfs.tar -C rootfs
          file rootfs/usr/bin/uname
          file rootfs/bin/sh
