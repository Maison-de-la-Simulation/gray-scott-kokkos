name: Test exercises

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_test_exercises:
    strategy:
      matrix:
        arch:
          - name: x86_64
            os: ubuntu-24.04
          - name: aarch64
            os: ubuntu-24.04-arm
        backend:
          - name: openmp
            image: kokkos_cpu_interactive
            flags: -DKokkos_ENABLE_OPENMP=ON
          - name: cuda
            image: kokkos_gpu_interactive
            flags: -DKokkos_ENABLE_CUDA=ON -DKokkos_ARCH_AMPERE80=ON
    runs-on: ${{ matrix.arch.os }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - run: |
          docker pull gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/${{ matrix.backend.image }}:latest
          docker run --rm gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/${{ matrix.backend.image }}:latest uname -m
          docker run --rm gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/${{ matrix.backend.image }}:latest file /home/jovyan/.pixi/bin/g++
