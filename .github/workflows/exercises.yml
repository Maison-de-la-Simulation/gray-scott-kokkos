name: Test exercises

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_test_exercises:
    strategy:
      matrix:
        arch:
          - name: x86_64
            os: ubuntu-24.04
          - name: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.os }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - run: |
          docker pull gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/kokkos_cpu_interactive
          docker run gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/kokkos_cpu_interactive g++ --version
          docker buildx imagetools inspect gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/kokkos_cpu_interactive
          docker create --name inspectme gitlab-registry.in2p3.fr/thomas.padioleau/gray-scott-kokkos/kokkos_cpu_interactive
          docker export inspectme -o rootfs.tar
          mkdir rootfs
          tar -xf rootfs.tar -C rootfs
          file rootfs/usr/bin/uname
          file rootfs/bin/sh
