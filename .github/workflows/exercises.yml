name: Test exercises

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_test_exercises:
    strategy:
      matrix:
        arch:
          - name: x86_64
            os: ubuntu-24.04
          - name: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.arch.os }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - run: |
          docker pull ghcr.io/prefix-dev/pixi:0.70.2-bookworm-slim@sha256:bd560f9117d5f554a328eaa1506588109fc641f12005613019a824bb4b177399
          docker buildx imagetools inspect ghcr.io/prefix-dev/pixi:0.70.2-bookworm-slim@sha256:bd560f9117d5f554a328eaa1506588109fc641f12005613019a824bb4b177399
          docker create --name inspectme ghcr.io/prefix-dev/pixi:0.70.2-bookworm-slim@sha256:bd560f9117d5f554a328eaa1506588109fc641f12005613019a824bb4b177399
          docker export inspectme -o rootfs.tar
          mkdir rootfs
          tar -xf rootfs.tar -C rootfs
          file rootfs/usr/bin/uname
          file rootfs/bin/sh
